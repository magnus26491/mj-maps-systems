[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "npm run migrate:prod && echo '[railway] Starting server...' && node -e \"require('./dist/services/api/server.js')\" 2>&1 || (echo '[railway] CRASH: node exited with code '$?'' && exit 1)"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
