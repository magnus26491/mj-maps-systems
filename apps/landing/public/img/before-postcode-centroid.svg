<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" role="img" aria-label="Postcode centroid geocoding result — marker placed mid-street on a dark street-style UK map">
  <title>Postcode centroid geocoding result</title>
  <desc>Dark street-style map showing a UK residential road intersection with a blue marker dropped in the middle of the carriageway — the typical result of postcode-centroid geocoding. The marker is on the road surface, not at the actual property.</desc>
  <defs>
    <filter id="blur-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="marker-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bottom-fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Base background: dark asphalt -->
  <rect width="600" height="400" fill="#0d1117"/>

  <!-- Park / grass areas -->
  <rect x="0"   y="0"   width="200" height="150" fill="#0c1a12" rx="2"/>
  <rect x="400" y="240" width="200" height="160" fill="#0c1a12" rx="2"/>
  <rect x="0"   y="320" width="160" height="80"  fill="#0c1a12" rx="2"/>

  <!-- A-roads (wider, lighter) -->
  <g stroke="#1e3a4d" stroke-width="18" stroke-linecap="round">
    <line x1="200" y1="0"   x2="200" y2="400"/>
    <line x1="0"   y1="280" x2="600" y2="280"/>
    <line x1="400" y1="0"   x2="400" y2="400"/>
  </g>

  <!-- B-roads -->
  <g stroke="#182636" stroke-width="12" stroke-linecap="round">
    <line x1="0" y1="140" x2="600" y2="140"/>
    <line x1="0" y1="360" x2="600" y2="360"/>
  </g>

  <!-- Secondary roads -->
  <g stroke="#131e28" stroke-width="7" stroke-linecap="round">
    <line x1="300" y1="0"   x2="300" y2="150"/>
    <line x1="300" y1="280" x2="300" y2="400"/>
    <line x1="480" y1="0"   x2="480" y2="280"/>
    <line x1="480" y1="360" x2="480" y2="400"/>
  </g>

  <!-- Residential streets -->
  <g stroke="#0f1820" stroke-width="5" stroke-linecap="round">
    <!-- Top-left block -->
    <line x1="50"  y1="50"  x2="50"  y2="140"/><line x1="50"  y1="50"  x2="200" y2="50"/>
    <line x1="100" y1="50"  x2="100" y2="140"/>
    <line x1="50"  y1="90"  x2="200" y2="90"/>
    <!-- Top-right block -->
    <line x1="220" y1="50"  x2="380" y2="50"/><line x1="220" y1="50"  x2="220" y2="140"/>
    <line x1="220" y1="90"  x2="380" y2="90"/>
    <!-- Left middle -->
    <line x1="50"  y1="160" x2="50"  y2="280"/><line x1="50"  y1="160" x2="200" y2="160"/>
    <line x1="50"  y1="200" x2="200" y2="200"/>
    <line x1="50"  y1="240" x2="200" y2="240"/>
    <!-- Right middle -->
    <line x1="420" y1="160" x2="580" y2="160"/><line x1="420" y1="160" x2="420" y2="280"/>
    <line x1="420" y1="200" x2="580" y2="200"/>
    <line x1="420" y1="240" x2="580" y2="240"/>
    <!-- Bottom blocks -->
    <line x1="50"  y1="300" x2="200" y2="300"/><line x1="50"  y1="300" x2="50"  y2="360"/>
    <line x1="50"  y1="330" x2="200" y2="330"/>
    <line x1="300" y1="300" x2="300" y2="360"/><line x1="300" y1="300" x2="460" y2="300"/>
    <line x1="300" y1="330" x2="460" y2="330"/>
    <line x1="50"  y1="360" x2="380" y2="360"/>
    <line x1="420" y1="300" x2="580" y2="300"/><line x1="420" y1="300" x2="420" y2="360"/>
    <line x1="420" y1="330" x2="580" y2="330"/>
    <line x1="420" y1="360" x2="600" y2="360"/>
  </g>

  <!-- Road centre dashes -->
  <g stroke="#2a4a5a" stroke-width="0.8" stroke-dasharray="6,8" stroke-linecap="round" opacity="0.4">
    <line x1="0" y1="280" x2="600" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="0" y1="140" x2="600" y2="140"/>
  </g>

  <!-- Buildings: dark rectangles suggesting houses -->
  <g fill="#131c24" opacity="0.95">
    <!-- Top-left -->
    <rect x="8"   y="8"   width="40" height="40" rx="2"/>
    <rect x="54"  y="8"   width="40" height="40" rx="2"/>
    <rect x="8"   y="54"  width="40" height="33" rx="2"/>
    <rect x="54"  y="54"  width="40" height="33" rx="2"/>
    <rect x="100" y="8"   width="96" height="40" rx="2"/>
    <rect x="100" y="54"  width="96" height="33" rx="2"/>
    <!-- Top-right -->
    <rect x="208" y="8"   width="50" height="40" rx="2"/>
    <rect x="264" y="8"   width="40" height="40" rx="2"/>
    <rect x="310" y="8"   width="86" height="40" rx="2"/>
    <rect x="208" y="54"  width="50" height="33" rx="2"/>
    <rect x="264" y="54"  width="40" height="33" rx="2"/>
    <rect x="310" y="54"  width="86" height="33" rx="2"/>
    <!-- Top-far-right -->
    <rect x="408" y="8"   width="68" height="40" rx="2"/>
    <rect x="408" y="54"  width="68" height="33" rx="2"/>
    <rect x="482" y="8"   width="52" height="40" rx="2"/>
    <rect x="482" y="54"  width="52" height="33" rx="2"/>
    <rect x="540" y="8"   width="52" height="40" rx="2"/>
    <rect x="540" y="54"  width="52" height="33" rx="2"/>
    <!-- Left middle -->
    <rect x="8"   y="165" width="40" height="33" rx="2"/>
    <rect x="54"  y="165" width="40" height="33" rx="2"/>
    <rect x="8"   y="205" width="40" height="33" rx="2"/>
    <rect x="54"  y="205" width="40" height="33" rx="2"/>
    <rect x="8"   y="245" width="40" height="33" rx="2"/>
    <rect x="54"  y="245" width="40" height="33" rx="2"/>
    <!-- Right middle -->
    <rect x="424" y="165" width="50" height="33" rx="2"/>
    <rect x="480" y="165" width="50" height="33" rx="2"/>
    <rect x="536" y="165" width="56" height="33" rx="2"/>
    <rect x="424" y="205" width="50" height="33" rx="2"/>
    <rect x="480" y="205" width="50" height="33" rx="2"/>
    <rect x="536" y="205" width="56" height="33" rx="2"/>
    <rect x="424" y="245" width="50" height="33" rx="2"/>
    <rect x="480" y="245" width="50" height="33" rx="2"/>
    <rect x="536" y="245" width="56" height="33" rx="2"/>
    <!-- Bottom -->
    <rect x="8"   y="305" width="40" height="53" rx="2"/>
    <rect x="54"  y="305" width="40" height="53" rx="2"/>
    <rect x="100" y="305" width="50" height="53" rx="2"/>
    <rect x="156" y="305" width="40" height="53" rx="2"/>
    <rect x="8"   y="364" width="40" height="34" rx="2"/>
    <rect x="54"  y="364" width="40" height="34" rx="2"/>
    <rect x="100" y="364" width="50" height="34" rx="2"/>
    <rect x="156" y="364" width="40" height="34" rx="2"/>
    <!-- Bottom centre-right -->
    <rect x="308" y="305" width="50" height="53" rx="2"/>
    <rect x="364" y="305" width="50" height="53" rx="2"/>
    <rect x="308" y="364" width="50" height="34" rx="2"/>
    <rect x="364" y="364" width="50" height="34" rx="2"/>
    <!-- Bottom right -->
    <rect x="424" y="305" width="50" height="53" rx="2"/>
    <rect x="480" y="305" width="50" height="53" rx="2"/>
    <rect x="536" y="305" width="56" height="53" rx="2"/>
    <rect x="424" y="364" width="50" height="34" rx="2"/>
    <rect x="480" y="364" width="50" height="34" rx="2"/>
    <rect x="536" y="364" width="56" height="34" rx="2"/>
  </g>

  <!-- Road labels -->
  <g fill="#1e4a5a" font-family="'IBM Plex Mono', monospace" font-size="8" opacity="0.5">
    <text x="270" y="134">Holly Lane</text>
    <text x="205" y="274">Main Road</text>
    <text x="410" y="374">Oak Way</text>
  </g>

  <!-- WRONG marker: mid-street, clearly on the road -->
  <!-- Glow -->
  <circle cx="310" cy="280" r="32" fill="url(#marker-glow)" filter="url(#blur-glow)"/>
  <!-- Pin body: teardrop on road surface -->
  <ellipse cx="310" cy="296" rx="10" ry="4" fill="#000" fill-opacity="0.4"/>
  <circle cx="310" cy="280" r="12" fill="#3B82F6"/>
  <circle cx="310" cy="280" r="6"  fill="#0d1117"/>
  <!-- Pin label chip -->
  <rect x="268" y="252" width="84" height="20" rx="4" fill="#1a2d3d" stroke="#3B82F6" stroke-width="0.8"/>
  <text x="310" y="266" text-anchor="middle" fill="#93C5FD" font-family="'IBM Plex Mono', monospace" font-size="9" font-weight="500">WR14 3HX</text>

  <!-- Dashed RED circle showing it's the wrong spot -->
  <circle cx="310" cy="280" r="24" fill="none" stroke="#EF4444" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Cross-hair lines through road centre -->
  <line x1="296" y1="280" x2="324" y2="280" stroke="#EF4444" stroke-width="0.7" opacity="0.4"/>
  <line x1="310" y1="266" x2="310" y2="294" stroke="#EF4444" stroke-width="0.7" opacity="0.4"/>

  <!-- Bottom scrim -->
  <rect x="0" y="320" width="600" height="80" fill="url(#bottom-fade)" opacity="0.7"/>

  <!-- Bottom label chip -->
  <rect x="12" y="370" width="230" height="22" rx="4" fill="#0d1117" fill-opacity="0.85" stroke="#334155" stroke-width="0.5"/>
  <text x="127" y="385" text-anchor="middle" fill="#64748B" font-family="'IBM Plex Mono', monospace" font-size="9">Postcode centroid — WR14 3HX</text>
</svg>
