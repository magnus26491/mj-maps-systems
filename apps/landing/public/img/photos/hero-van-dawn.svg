<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" role="img" aria-label="White box van at dawn on a narrow UK rural lane, hedgerows on both sides, fog in the distance">
  <title>Box van at dawn — hero image</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1520"/>
      <stop offset="30%"  stop-color="#1a2840"/>
      <stop offset="55%"  stop-color="#2a3850"/>
      <stop offset="68%"  stop-color="#c47030"/>
      <stop offset="74%"  stop-color="#e8903a"/>
      <stop offset="80%"  stop-color="#7a4a18"/>
      <stop offset="100%" stop-color="#3a3a4a"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </linearGradient>
    <linearGradient id="vbody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f2f2f2"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <linearGradient id="vshadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fog" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6a7a8a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#b0c0cc" stop-opacity="0.15"/>
    </linearGradient>
    <radialGradient id="taillight" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff2020" stop-opacity="0.9"/>
      <stop offset="60%"  stop-color="#ff0000" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="horizon" cx="50%" cy="0%" r="80%">
      <stop offset="0%"   stop-color="#f0a030" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#806020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="45%" r="70%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.65"/>
    </radialGradient>
    <filter id="mist" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="sw"   x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="5" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <ellipse cx="960" cy="580" rx="800" ry="180" fill="url(#horizon)" filter="url(#mist)"/>

  <!-- Verge/grass -->
  <path d="M 0 700 Q 300 680 600 690 Q 900 700 1100 695 L 1100 1080 L 0 1080 Z" fill="#182014"/>
  <path d="M 1920 700 Q 1620 680 1320 690 Q 1020 700 820 695 L 820 1080 L 1920 1080 Z" fill="#182014"/>

  <!-- Hedgerows -->
  <g>
    <path d="M 0 420 Q 150 400 300 415 Q 450 430 600 415 Q 750 400 900 418 Q 1050 430 1100 415 L 1100 700 Q 900 710 700 700 Q 500 690 300 700 Q 150 710 0 700 Z" fill="#0c180a"/>
    <path d="M 0 460 Q 150 440 300 455 Q 450 468 600 455 Q 750 442 900 458 Q 1050 470 1100 455 L 1100 680 Q 900 688 700 680 Q 500 672 300 682 Q 150 690 0 680 Z" fill="#101e0c"/>
    <ellipse cx="60"  cy="448" rx="55" ry="28" fill="#0a1408"/>
    <ellipse cx="180" cy="436" rx="65" ry="30" fill="#0c180a"/>
    <ellipse cx="320" cy="450" rx="60" ry="28" fill="#101810"/>
    <ellipse cx="460" cy="438" rx="70" ry="30" fill="#0a1408"/>
    <ellipse cx="600" cy="452" rx="55" ry="28" fill="#0c180a"/>
    <ellipse cx="740" cy="440" rx="60" ry="30" fill="#101810"/>
    <ellipse cx="880" cy="450" rx="65" ry="28" fill="#0a1408"/>
  </g>
  <g>
    <path d="M 1920 420 Q 1770 400 1620 415 Q 1470 430 1320 415 Q 1170 400 1020 418 Q 870 430 820 415 L 820 700 Q 1020 710 1220 700 Q 1420 690 1620 700 Q 1770 710 1920 700 Z" fill="#0c180a"/>
    <path d="M 1920 460 Q 1770 440 1620 455 Q 1470 468 1320 455 Q 1170 442 1020 458 Q 870 470 820 455 L 820 680 Q 1020 688 1220 680 Q 1420 672 1620 682 Q 1770 690 1920 680 Z" fill="#101e0c"/>
    <ellipse cx="1860" cy="448" rx="55" ry="28" fill="#0a1408"/>
    <ellipse cx="1740" cy="436" rx="65" ry="30" fill="#0c180a"/>
    <ellipse cx="1600" cy="450" rx="60" ry="28" fill="#101810"/>
    <ellipse cx="1460" cy="438" rx="70" ry="30" fill="#0a1408"/>
    <ellipse cx="1320" cy="452" rx="55" ry="28" fill="#0c180a"/>
    <ellipse cx="1180" cy="440" rx="60" ry="30" fill="#101810"/>
    <ellipse cx="1040" cy="450" rx="65" ry="28" fill="#0a1408"/>
  </g>

  <!-- Road -->
  <path d="M 720 700 L 1200 700 L 1920 1080 L 0 1080 Z" fill="url(#road)"/>
  <line x1="720" y1="700" x2="0"   y2="1080" stroke="#28282e" stroke-width="2" opacity="0.5"/>
  <line x1="1200" y1="700" x2="1920" y2="1080" stroke="#28282e" stroke-width="2" opacity="0.5"/>
  <g stroke="#383840" stroke-width="1.2" stroke-dasharray="18,28" stroke-linecap="round" opacity="0.3">
    <line x1="730" y1="720" x2="1920" y2="1080"/>
    <line x1="1190" y1="720" x2="0"   y2="1080"/>
  </g>

  <!-- Fog layers -->
  <rect x="0" y="620" width="1920" height="460" fill="url(#fog)" filter="url(#mist)" opacity="0.45"/>
  <rect x="0" y="820" width="1920" height="260" fill="#b0bcc4" fill-opacity="0.12" filter="url(#mist)"/>

  <!-- Van shadow -->
  <ellipse cx="960" cy="920" rx="210" ry="28" fill="url(#vshadow)" opacity="0.45"/>

  <!-- VAN (rear 3/4 view, heading away from camera) -->
  <g filter="url(#sw)">
    <!-- Cargo box -->
    <rect x="700" y="560" width="520" height="300" rx="6" fill="url(#vbody)"/>
    <!-- Panel ribs -->
    <g stroke="#d0d0d0" stroke-width="0.7" opacity="0.35">
      <line x1="700" y1="630" x2="1220" y2="630"/>
      <line x1="700" y1="700" x2="1220" y2="700"/>
      <line x1="700" y1="770" x2="1220" y2="770"/>
      <line x1="700" y1="840" x2="1220" y2="840"/>
    </g>
    <!-- Rear doors (split) -->
    <line x1="960" y1="560" x2="960" y2="860" stroke="#c0c0c0" stroke-width="1.5"/>
    <rect x="700"  y="560" width="260" height="300" fill="none" stroke="#c8c8c8" stroke-width="1.5"/>
    <rect x="960"  y="560" width="260" height="300" fill="none" stroke="#c8c8c8" stroke-width="1.5"/>
    <!-- Door handles -->
    <rect x="940" y="710" width="12" height="5" rx="2" fill="#a0a0a0"/>
    <rect x="968" y="710" width="12" height="5" rx="2" fill="#a0a0a0"/>
    <!-- Side panel -->
    <rect x="1220" y="560" width="70" height="300" rx="0" fill="#d0d0d0"/>
    <rect x="1224" y="600" width="62" height="220" rx="3" fill="#e4e4e4"/>
    <!-- Cab -->
    <rect x="1290" y="600" width="150" height="260" rx="8" fill="url(#vbody)"/>
    <rect x="1290" y="590" width="150" height="22" rx="4" fill="#e0e0e0"/>
    <!-- Rear window -->
    <rect x="1310" y="615" width="110" height="75" rx="4" fill="#18202e" fill-opacity="0.85"/>
    <rect x="1315" y="620" width="45" height="5" rx="2" fill="#fff" fill-opacity="0.12"/>
    <!-- Bumper -->
    <rect x="1290" y="850" width="150" height="14" rx="3" fill="#b8b8b8"/>
    <!-- Tail lights — left cluster -->
    <rect x="1298" y="808" width="30" height="38" rx="4" fill="#1a0808"/>
    <rect x="1302" y="812" width="11" height="15" rx="2" fill="#cc1818" opacity="0.9"/>
    <rect x="1302" y="830" width="11" height="11" rx="2" fill="#ff8800" opacity="0.7"/>
    <rect x="1315" y="812" width="9"  height="11" rx="2" fill="#cc1818" opacity="0.6"/>
    <rect x="1315" y="825" width="9"  height="15" rx="2" fill="#cc1818" opacity="0.9"/>
    <!-- Tail lights — right cluster -->
    <rect x="1392" y="808" width="30" height="38" rx="4" fill="#1a0808"/>
    <rect x="1396" y="812" width="11" height="15" rx="2" fill="#cc1818" opacity="0.9"/>
    <rect x="1396" y="830" width="11" height="11" rx="2" fill="#ff8800" opacity="0.7"/>
    <rect x="1409" y="812" width="9"  height="11" rx="2" fill="#cc1818" opacity="0.6"/>
    <rect x="1409" y="825" width="9"  height="15" rx="2" fill="#cc1818" opacity="0.9"/>
    <!-- Number plate -->
    <rect x="1340" y="862" width="50" height="20" rx="2" fill="#f4f4dc"/>
    <text x="1365" y="876" text-anchor="middle" fill="#1a1a28" font-family="monospace" font-size="10" font-weight="bold">NL63 OXM</text>
    <!-- Wheels -->
    <ellipse cx="800"  cy="860" rx="44" ry="18" fill="#111"/>
    <ellipse cx="800"  cy="860" rx="30" ry="12" fill="#1c1c1c"/>
    <ellipse cx="800"  cy="860" rx="12" ry="6"  fill="#282828"/>
    <ellipse cx="1150" cy="860" rx="44" ry="18" fill="#111"/>
    <ellipse cx="1150" cy="860" rx="30" ry="12" fill="#1c1c1c"/>
    <ellipse cx="1150" cy="860" rx="12" ry="6"  fill="#282828"/>
    <!-- Exhaust -->
    <rect x="1320" y="868" width="45" height="8" rx="2" fill="#808080"/>
    <!-- Side mirror -->
    <rect x="1278" y="640" width="16" height="11" rx="2" fill="#b8b8b8"/>
  </g>

  <!-- Tail light glow -->
  <ellipse cx="1365" cy="828" rx="55" ry="32" fill="url(#taillight)" filter="url(#mist)" opacity="0.35"/>

  <!-- Fog foreground -->
  <rect x="0" y="920" width="1920" height="160" fill="#c0cad4" fill-opacity="0.07" filter="url(#mist)"/>

  <!-- Foreground grass -->
  <g fill="#182014" opacity="0.6">
    <path d="M 0 1040 Q 60 1020 120 1030 Q 180 1040 240 1030 L 240 1080 L 0 1080 Z"/>
    <path d="M 1920 1040 Q 1860 1020 1800 1030 Q 1740 1040 1680 1030 L 1680 1080 L 1920 1080 Z"/>
  </g>

  <!-- Vignette + grain -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
  <rect width="1920" height="1080" fill="#808080" fill-opacity="0.025" filter="url(#grain)"/>
</svg>