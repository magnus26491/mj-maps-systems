<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Night-time view through windscreen showing a clear junction ahead with GREEN turn-score displayed on the navigation HUD">
  <title>Night driving — GREEN turn score HUD — turn-score feature</title>
  <defs>
    <!-- Night windscreen gradient -->
    <linearGradient id="ws6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#060810"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <!-- Road night -->
    <linearGradient id="road6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#0a0a0e"/>
    </linearGradient>
    <!-- Streetlight glow -->
    <radialGradient id="lamp6" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffe890" stop-opacity="0.9"/>
      <stop offset="30%"  stop-color="#ffc060" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff9040" stop-opacity="0"/>
    </radialGradient>
    <!-- HUD green -->
    <radialGradient id="hud-green" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <!-- Dashboard gradient -->
    <linearGradient id="dash6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1a22"/>
      <stop offset="100%" stop-color="#0a0a10"/>
    </linearGradient>
    <radialGradient id="vignette6b" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="glow6" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="4"/></filter>
    <filter id="grain6b" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>

  <!-- WINDSCREEN VIEW (night) -->
  <rect width="1600" height="700" fill="url(#ws6)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="100"  cy="60"  r="1.5"/>
    <circle cx="300"  cy="40"  r="1"/>
    <circle cx="500"  cy="80"  r="1.5"/>
    <circle cx="700"  cy="30"  r="1"/>
    <circle cx="1000" cy="70"  r="1.5"/>
    <circle cx="1200" cy="50"  r="1"/>
    <circle cx="1400" cy="90"  r="1.5"/>
    <circle cx="200"  cy="120" r="1"/>
    <circle cx="800"  cy="110" r="1"/>
    <circle cx="1500" cy="60"  r="1"/>
  </g>

  <!-- Road (night, headlight illumination) -->
  <!-- Road surface with headlight reflection -->
  <path d="M 600 700 L 1000 700 L 1500 200 L 100 200 Z" fill="url(#road6)"/>
  <!-- Road edges -->
  <line x1="600" y1="700" x2="100"  y2="200" stroke="#2a2a30" stroke-width="2" opacity="0.5"/>
  <line x1="1000" y1="700" x2="1500" y2="200" stroke="#2a2a30" stroke-width="2" opacity="0.5"/>
  <!-- Headlight cones -->
  <path d="M 640 700 L 100 200 L 500 200 L 960 700 Z" fill="#ffe8a0" fill-opacity="0.04"/>
  <path d="M 960 700 L 500 200 L 1100 200 L 1040 700 Z" fill="#ffe8a0" fill-opacity="0.04"/>

  <!-- Road markings (visible in headlights) -->
  <g stroke="#4a4a52" stroke-width="1.5" stroke-dasharray="20,30" stroke-linecap="round" opacity="0.4">
    <line x1="620" y1="680" x2="1400" y2="220"/>
    <line x1="980" y1="680" x2="200"  y2="220"/>
  </g>

  <!-- Street lights -->
  <!-- Left lamp -->
  <line x1="580" y1="700" x2="520" y2="200" stroke="#606068" stroke-width="2"/>
  <circle cx="520" cy="200" r="6" fill="#ffe890" filter="url(#glow6)" opacity="0.9"/>
  <ellipse cx="520" cy="280" rx="80" ry="40" fill="url(#lamp6)" opacity="0.15"/>
  <!-- Right lamp -->
  <line x1="1020" y1="700" x2="1100" y2="200" stroke="#606068" stroke-width="2"/>
  <circle cx="1100" cy="200" r="6" fill="#ffe890" filter="url(#glow6)" opacity="0.9"/>
  <ellipse cx="1100" cy="280" rx="80" ry="40" fill="url(#lamp6)" opacity="0.15"/>

  <!-- Buildings on either side (night, lit windows) -->
  <g fill="#0a0a12">
    <!-- Left buildings -->
    <rect x="0"   y="120" width="120" height="580"/>
    <rect x="100" y="100" width="130" height="600"/>
    <rect x="0"   y="120" width="120" height="580"/>
    <!-- Right buildings -->
    <rect x="1350" y="120" width="250" height="580"/>
    <rect x="1480" y="140" width="120" height="560"/>
  </g>
  <!-- Lit windows -->
  <g fill="#ffd060" opacity="0.5">
    <rect x="15"  y="160" width="20" height="14" rx="1"/>
    <rect x="50"  y="160" width="20" height="14" rx="1"/>
    <rect x="85"  y="160" width="20" height="14" rx="1"/>
    <rect x="15"  y="200" width="20" height="14" rx="1"/>
    <rect x="85"  y="200" width="20" height="14" rx="1"/>
    <rect x="115" y="160" width="20" height="14" rx="1"/>
    <rect x="115" y="200" width="20" height="14" rx="1"/>
    <rect x="115" y="240" width="20" height="14" rx="1"/>
    <rect x="115" y="280" width="20" height="14" rx="1"/>
    <rect x="1370" y="160" width="20" height="14" rx="1"/>
    <rect x="1405" y="160" width="20" height="14" rx="1"/>
    <rect x="1370" y="200" width="20" height="14" rx="1"/>
    <rect x="1405" y="200" width="20" height="14" rx="1"/>
    <rect x="1370" y="240" width="20" height="14" rx="1"/>
  </g>

  <!-- CAR INTERIOR (windscreen frame) -->
  <!-- Dashboard (bottom) -->
  <rect x="0" y="680" width="1600" height="220" fill="url(#dash6)"/>
  <!-- Dashboard curve / cowl -->
  <path d="M 0 680 Q 800 660 1600 680 L 1600 700 Q 800 680 0 700 Z" fill="#1a1a22"/>

  <!-- Steering wheel -->
  <circle cx="800" cy="780" r="80" fill="none" stroke="#2a2a30" stroke-width="12"/>
  <circle cx="800" cy="780" r="30" fill="none" stroke="#2a2a30" stroke-width="8"/>
  <line x1="720" y1="780" x2="880" y2="780" stroke="#2a2a30" stroke-width="8"/>
  <line x1="800" y1="700" x2="800" y2="860" stroke="#2a2a30" stroke-width="8"/>

  <!-- GPS / INFOTAINMENT screen (centre) -->
  <rect x="960" y="700" width="120" height="80" rx="6" fill="#0a0a12" stroke="#2a2a30" stroke-width="2"/>
  <rect x="966" y="706" width="108" height="68" rx="3" fill="#0d1420"/>
  <circle cx="1020" cy="740" r="20" fill="#1a2838"/>
  <text x="1020" y="744" text-anchor="middle" fill="#00C2A8" font-family="'IBM Plex Mono', monospace" font-size="10">18:42</text>

  <!-- A-PILLARS (windscreen frame) -->
  <path d="M 0 680 L 200 0 L 320 0 L 120 680 Z" fill="#0a0a0e"/>
  <path d="M 1600 680 L 1400 0 L 1280 0 L 1480 680 Z" fill="#0a0a0e"/>

  <!-- ─────────────────────────────────────── -->
  <!-- MJ MAPS HUD OVERLAY (on windscreen) -->
  <!-- ─────────────────────────────────────── -->

  <!-- HUD: GREEN turn-score panel (top-centre) -->
  <g transform="translate(800, 100)">
    <!-- Glow behind HUD -->
    <ellipse cx="0" cy="20" rx="200" ry="80" fill="url(#hud-green)"/>

    <!-- Turn instruction card -->
    <rect x="-180" y="0" width="360" height="90" rx="12" fill="#0a1a14" stroke="#10B981" stroke-width="1.5" opacity="0.97"/>

    <!-- GREEN chip -->
    <rect x="-168" y="12" width="60" height="26" rx="13" fill="#10B981" fill-opacity="0.2" stroke="#10B981" stroke-width="1"/>
    <text x="-138" y="30" text-anchor="middle" fill="#10B981" font-family="'IBM Plex Mono', monospace" font-size="13" font-weight="700">GREEN</text>

    <!-- Turn instruction -->
    <text x="-95" y="25" fill="#F1F5F9" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700">In 400 m — Turn right</text>
    <text x="-95" y="46" fill="#94A3B8" font-family="'Space Grotesk', sans-serif" font-size="13">onto B4228 Wood Lane</text>

    <!-- Distance + ETA -->
    <text x="-168" y="72" fill="#64748B" font-family="'IBM Plex Mono', monospace" font-size="11">400 m</text>
    <text x="-80"  y="72" fill="#64748B" font-family="'IBM Plex Mono', monospace" font-size="11">·</text>
    <text x="-65"  y="72" fill="#64748B" font-family="'IBM Plex Mono', monospace" font-size="11">ETA 18:46</text>

    <!-- Score bar -->
    <rect x="120" y="20" width="80" height="50" rx="6" fill="#0a1420"/>
    <!-- Score label -->
    <text x="160" y="38" text-anchor="middle" fill="#10B981" font-family="'IBM Plex Mono', monospace" font-size="9">SCORE</text>
    <text x="160" y="58" text-anchor="middle" fill="#10B981" font-family="'IBM Plex Mono', monospace" font-size="16" font-weight="700">92</text>
    <text x="160" y="68" text-anchor="middle" fill="#64748B" font-family="'IBM Plex Mono', monospace" font-size="7">/100</text>
  </g>

  <!-- Route line on road (green glow) -->
  <path d="M 640 700 L 640 450 L 800 350 L 960 450 L 960 700"
        stroke="#10B981" stroke-width="3" stroke-opacity="0.6"
        stroke-linecap="round" fill="none" filter="url(#glow6)"/>

  <!-- Turn arrow (GREEN) -->
  <g transform="translate(800, 320)" filter="url(#glow6)">
    <path d="M 0 -30 L 20 0 L 10 0 L 10 30 L -10 30 L -10 0 L -20 0 Z"
          fill="#10B981" fill-opacity="0.9"/>
  </g>

  <!-- Speed limit (top right) -->
  <g transform="translate(1380, 60)">
    <rect x="0" y="0" width="60" height="60" rx="8" fill="#0a0a12" stroke="#2a2a30" stroke-width="1"/>
    <circle cx="30" cy="30" r="26" fill="#cc0000"/>
    <text x="30" y="42" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="26" font-weight="bold">60</text>
  </g>

  <!-- Vignette + grain -->
  <rect width="1600" height="700" fill="url(#vignette6b)"/>
  <rect width="1600" height="900" fill="#000" fill-opacity="0.05"/>
  <rect width="1600" height="900" fill="#808080" fill-opacity="0.015" filter="url(#grain6b)"/>
</svg>