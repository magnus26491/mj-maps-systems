<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Driver in hi-vis standing at a UK farm gate with phone showing a Plus Code pin on screen">
  <title>Driver at farm gate with Plus Code pin — last-50m delivery section</title>
  <defs>
    <linearGradient id="sky4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3a60"/>
      <stop offset="50%"  stop-color="#3a6090"/>
      <stop offset="100%" stop-color="#6a8ab0"/>
    </linearGradient>
    <linearGradient id="ground4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a6030"/>
      <stop offset="100%" stop-color="#2a4818"/>
    </linearGradient>
    <linearGradient id="track4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7a6848"/>
      <stop offset="100%" stop-color="#5a4830"/>
    </linearGradient>
    <radialGradient id="vignette4" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="sw4" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="grain4" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky4)"/>
  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.4">
    <ellipse cx="200"  cy="80"  rx="100" ry="40"/>
    <ellipse cx="320"  cy="60"  rx="80"  ry="35"/>
    <ellipse cx="1200" cy="100" rx="120" ry="50"/>
    <ellipse cx="1350" cy="75"  rx="90"  ry="40"/>
    <ellipse cx="800"  cy="50"  rx="70"  ry="30"/>
  </g>

  <!-- Distant fields -->
  <rect x="0" y="300" width="1600" height="200" fill="#3a6028" opacity="0.6"/>

  <!-- Ground / grass -->
  <rect x="0" y="500" width="1600" height="400" fill="url(#ground4)"/>

  <!-- Farm track (gravel/dirt path to gate) -->
  <path d="M 800 900 Q 850 700 900 580 Q 950 480 1000 420 Q 1050 360 1100 320 L 1300 200 L 1400 200 L 1400 340 Q 1300 420 1200 500 Q 1150 560 1100 640 Q 1050 720 1000 900 Z" fill="url(#track4)"/>
  <!-- Track edge -->
  <path d="M 800 900 Q 860 700 910 580 Q 960 480 1010 420 Q 1060 360 1110 320 L 1110 340 Q 1060 380 1010 440 Q 960 500 910 600 Q 860 720 800 900 Z" fill="#5a4830" opacity="0.4"/>

  <!-- Gate -->
  <g stroke="#a08040" stroke-width="4" fill="none">
    <!-- Left post -->
    <line x1="1090" y1="200" x2="1090" y2="380"/>
    <!-- Right post -->
    <line x1="1310" y1="200" x2="1310" y2="380"/>
    <!-- Top rail -->
    <line x1="1090" y1="205" x2="1310" y2="205"/>
    <!-- Cross bars -->
    <line x1="1090" y1="260" x2="1310" y2="260"/>
    <line x1="1090" y1="320" x2="1310" y2="320"/>
    <!-- Diagonal brace -->
    <line x1="1090" y1="205" x2="1310" y2="380"/>
    <line x1="1310" y1="205" x2="1090" y2="380"/>
  </g>
  <!-- Gate latch -->
  <rect x="1296" y="285" width="18" height="12" rx="2" fill="#c0a050"/>
  <!-- Gate sign -->
  <rect x="1100" y="155" width="180" height="42" rx="4" fill="#f0f0dc"/>
  <text x="1190" y="182" text-anchor="middle" fill="#2a2a18" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="600">HARDWICK FARM</text>

  <!-- Farm beyond gate -->
  <rect x="1090" y="150" width="220" height="55" fill="#3a5820" opacity="0.5"/>
  <!-- Farm buildings -->
  <rect x="1120" y="80"  width="80" height="70" rx="3" fill="#c8b898" stroke="#a09070" stroke-width="1"/>
  <rect x="1210" y="90"  width="60" height="60" rx="3" fill="#b8a888" stroke="#a09070" stroke-width="1"/>
  <rect x="1120" y="80"  width="80" height="15" rx="2" fill="#a89060"/>

  <!-- DRIVER (hi-vis, facing away from camera, at gate) -->
  <g filter="url(#sw4)">
    <!-- Shadow -->
    <ellipse cx="940" cy="860" rx="50" ry="12" fill="#000" fill-opacity="0.3"/>
    <!-- Legs (dark work trousers) -->
    <rect x="910" y="720" width="22" height="140" rx="5" fill="#1a2030"/>
    <rect x="936" y="720" width="22" height="140" rx="5" fill="#1a2030"/>
    <!-- Boots -->
    <rect x="906" y="845" width="28" height="20" rx="4" fill="#2a2018"/>
    <rect x="932" y="845" width="28" height="20" rx="4" fill="#2a2018"/>
    <!-- Torso (hi-vis vest) -->
    <rect x="902" y="610" width="60" height="115" rx="6" fill="#e8c820"/>
    <!-- Hi-vis vest stripe detail -->
    <rect x="902" y="625" width="60" height="8"  rx="0" fill="#1a1a1a" opacity="0.6"/>
    <rect x="902" y="648" width="60" height="8"  rx="0" fill="#1a1a1a" opacity="0.6"/>
    <rect x="902" y="671" width="60" height="8"  rx="0" fill="#1a1a1a" opacity="0.6"/>
    <rect x="902" y="694" width="60" height="8"  rx="0" fill="#1a1a1a" opacity="0.6"/>
    <!-- Body armour / jacket -->
    <rect x="902" y="610" width="60" height="115" rx="6" fill="#2a3850" opacity="0.4"/>
    <!-- Left arm (holding phone) -->
    <path d="M 902 630 Q 860 660 850 700 Q 840 740 860 770" stroke="#1a2030" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Glove -->
    <circle cx="862" cy="772" r="12" fill="#2a2018"/>
    <!-- Right arm (by side) -->
    <path d="M 962 630 Q 980 680 975 730" stroke="#1a2030" stroke-width="18" stroke-linecap="round" fill="none"/>
    <!-- Glove right -->
    <circle cx="976" cy="732" r="11" fill="#2a2018"/>
    <!-- Head -->
    <circle cx="932" cy="590" r="28" fill="#d4a880"/>
    <!-- Helmet / hat (safety helmet) -->
    <ellipse cx="932" cy="574" rx="28" ry="12" fill="#e8c820"/>
    <rect x="908" y="568" width="48" height="18" rx="4" fill="#e8c820"/>
    <ellipse cx="932" cy="575" rx="26" ry="10" fill="#f0d830"/>
  </g>

  <!-- PHONE in hand (showing Plus Code screen) -->
  <g filter="url(#sw4)" transform="translate(810, 720)">
    <!-- Phone body -->
    <rect x="0" y="0" width="70" height="110" rx="8" fill="#1a1a28"/>
    <!-- Screen -->
    <rect x="4" y="6" width="62" height="98" rx="4" fill="#0d1420"/>
    <!-- Screen content: map + pin -->
    <!-- Map background -->
    <rect x="4" y="6" width="62" height="50" rx="4" fill="#1a2838"/>
    <!-- Road lines on screen -->
    <g stroke="#2a3a4a" stroke-width="2" opacity="0.8">
      <line x1="4" y1="31" x2="66" y2="31"/>
    </g>
    <!-- Pin on screen -->
    <circle cx="35" cy="31" r="6" fill="#00C2A8"/>
    <circle cx="35" cy="31" r="3" fill="#0d1420"/>
    <!-- Plus Code text -->
    <text x="35" y="72" text-anchor="middle" fill="#00E8D4" font-family="'IBM Plex Mono', monospace" font-size="7" font-weight="600">9C3W+4GW</text>
    <text x="35" y="83" text-anchor="middle" fill="#94A3B8" font-family="'IBM Plex Mono', monospace" font-size="5">Malvern</text>
    <text x="35" y="94" text-anchor="middle" fill="#64748B" font-family="'IBM Plex Mono', monospace" font-size="5">2m from gate</text>
  </g>

  <!-- MJ Maps pin marker at gate -->
  <g transform="translate(1120, 320)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="30" fill="#00C2A8" fill-opacity="0.2" filter="url(#sw4)"/>
    <!-- Pin -->
    <circle cx="0" cy="0" r="12" fill="#00C2A8"/>
    <circle cx="0" cy="0" r="6"  fill="#0d1420"/>
    <circle cx="0" cy="0" r="3"  fill="#00C2A8" opacity="0.6"/>
    <!-- Pin label -->
    <rect x="-52" y="-36" width="104" height="20" rx="5" fill="#0d1420" stroke="#00C2A8" stroke-width="1"/>
    <text x="0" y="-22" text-anchor="middle" fill="#00C2A8" font-family="'IBM Plex Mono', monospace" font-size="8" font-weight="600">9C3W+4GW</text>
  </g>

  <!-- Distance indicator: "2m from gate" -->
  <g transform="translate(980, 700)">
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#00C2A8" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
    <circle cx="0" cy="-60" r="4" fill="#00C2A8" opacity="0.6"/>
    <rect x="-60" y="-100" width="120" height="22" rx="4" fill="#0d1420" stroke="#00C2A8" stroke-width="0.5" opacity="0.9"/>
    <text x="0" y="-85" text-anchor="middle" fill="#00E8D4" font-family="'IBM Plex Mono', monospace" font-size="10">2m from gate</text>
  </g>

  <!-- Hedgerow left -->
  <g fill="#1a3810" opacity="0.9">
    <ellipse cx="200" cy="500" rx="180" ry="80"/>
    <ellipse cx="450" cy="490" rx="200" ry="90"/>
    <ellipse cx="700" cy="510" rx="180" ry="85"/>
    <ellipse cx="100" cy="540" rx="150" ry="60"/>
  </g>

  <!-- Hedgerow right (beyond gate) -->
  <g fill="#1a3810" opacity="0.7">
    <ellipse cx="1480" cy="480" rx="180" ry="80"/>
    <ellipse cx="1550" cy="520" rx="150" ry="70"/>
  </g>

  <!-- Grass foreground -->
  <g fill="#3a6020" opacity="0.5">
    <path d="M 0 820 Q 100 800 200 810 Q 300 820 400 810 L 400 900 L 0 900 Z"/>
    <path d="M 1200 820 Q 1300 800 1400 810 Q 1500 820 1600 810 L 1600 900 L 1200 900 Z"/>
  </g>

  <!-- Vignette + grain -->
  <rect width="1600" height="900" fill="url(#vignette4)"/>
  <rect width="1600" height="900" fill="#808080" fill-opacity="0.02" filter="url(#grain4)"/>
</svg>