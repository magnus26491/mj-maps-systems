<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="HGV lorry stopped under a low railway bridge showing a 4.2 metre height restriction sign">
  <title>HGV under low bridge — vehicle-aware routing feature</title>
  <defs>
    <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a3050"/>
      <stop offset="50%"  stop-color="#2a4868"/>
      <stop offset="100%" stop-color="#4a6880"/>
    </linearGradient>
    <linearGradient id="road3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#28282e"/>
      <stop offset="100%" stop-color="#18181e"/>
    </linearGradient>
    <linearGradient id="bridge-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#505058"/>
      <stop offset="100%" stop-color="#38383e"/>
    </linearGradient>
    <linearGradient id="lorry-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#c8c8d0"/>
      <stop offset="100%" stop-color="#a0a0a8"/>
    </linearGradient>
    <filter id="sw3" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/></filter>
    <filter id="sign-glow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ff6600" flood-opacity="0.6"/></filter>
    <radialGradient id="alert-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff4400" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette3" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="grain3" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="multiply"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky3)"/>
  <!-- Clouds -->
  <g fill="#ffffff" opacity="0.3" filter="url(#sw3)">
    <ellipse cx="200" cy="80"  rx="100" ry="40"/>
    <ellipse cx="320" cy="60"  rx="80"  ry="35"/>
    <ellipse cx="1100" cy="100" rx="120" ry="50"/>
    <ellipse cx="1240" cy="80"  rx="90"  ry="40"/>
    <ellipse cx="700"  cy="50"  rx="70"  ry="30"/>
  </g>

  <!-- Background: buildings -->
  <g fill="#1a2030" opacity="0.8">
    <rect x="0"   y="200" width="180" height="500" rx="2"/>
    <rect x="1400" y="200" width="200" height="500" rx="2"/>
    <rect x="0"   y="220" width="180" height="60" rx="2" fill="#202838"/>
    <rect x="1400" y="220" width="200" height="60" rx="2" fill="#202838"/>
    <!-- Windows -->
    <g fill="#2a3850" opacity="0.6">
      <rect x="20"  y="300" width="30" height="20" rx="1"/>
      <rect x="60"  y="300" width="30" height="20" rx="1"/>
      <rect x="100" y="300" width="30" height="20" rx="1"/>
      <rect x="20"  y="340" width="30" height="20" rx="1"/>
      <rect x="60"  y="340" width="30" height="20" rx="1"/>
      <rect x="100" y="340" width="30" height="20" rx="1"/>
      <rect x="20"  y="380" width="30" height="20" rx="1"/>
      <rect x="60"  y="380" width="30" height="20" rx="1"/>
      <rect x="100" y="380" width="30" height="20" rx="1"/>
      <rect x="1420" y="300" width="30" height="20" rx="1"/>
      <rect x="1460" y="300" width="30" height="20" rx="1"/>
      <rect x="1500" y="300" width="30" height="20" rx="1"/>
      <rect x="1540" y="300" width="30" height="20" rx="1"/>
      <rect x="1420" y="340" width="30" height="20" rx="1"/>
      <rect x="1460" y="340" width="30" height="20" rx="1"/>
      <rect x="1500" y="340" width="30" height="20" rx="1"/>
      <rect x="1540" y="340" width="30" height="20" rx="1"/>
    </g>
  </g>

  <!-- Grass verge -->
  <rect x="0" y="700" width="1600" height="200" fill="#2a4818"/>

  <!-- Road -->
  <rect x="0" y="600" width="1600" height="300" fill="url(#road3)"/>
  <line x1="0" y1="600" x2="1600" y2="600" stroke="#38383e" stroke-width="2.5"/>
  <g stroke="#404048" stroke-width="1.2" stroke-dasharray="20,28" stroke-linecap="round" opacity="0.4">
    <line x1="0" y1="660" x2="1600" y2="660"/>
  </g>

  <!-- BRIDGE -->
  <!-- Left pillar -->
  <rect x="0"   y="350" width="80"  height="500" fill="url(#bridge-grad)"/>
  <rect x="0"   y="350" width="80"  height="20"  rx="2" fill="#606068"/>
  <!-- Right pillar -->
  <rect x="1520" y="350" width="80"  height="500" fill="url(#bridge-grad)"/>
  <rect x="1520" y="350" width="80"  height="20"  rx="2" fill="#606068"/>
  <!-- Bridge soffit (underside) -->
  <rect x="80"  y="500" width="1440" height="120" fill="#404048"/>
  <!-- Bridge deck -->
  <rect x="80"  y="420" width="1440" height="80"  fill="#505058"/>
  <!-- Bridge arch/opening -->
  <path d="M 80 500 L 80 620 L 1520 620 L 1520 500 Z" fill="#18181e"/>
  <!-- Arch detail lines -->
  <g stroke="#303038" stroke-width="1" opacity="0.5">
    <line x1="80"  y1="540" x2="1520" y2="540"/>
    <line x1="80"  y1="580" x2="1520" y2="580"/>
  </g>

  <!-- Bridge height clearance line (the critical measure) -->
  <line x1="80" y1="540" x2="1520" y2="540" stroke="#ff6600" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.7"/>

  <!-- Height sign: 4.2m restriction -->
  <g transform="translate(1100, 280)" filter="url(#sign-glow)">
    <!-- Sign post -->
    <rect x="28" y="60" width="8" height="160" rx="2" fill="#808080"/>
    <!-- Sign board: red circle with white text -->
    <circle cx="32" cy="32" r="52" fill="#cc0000" stroke="#ff4444" stroke-width="3"/>
    <circle cx="32" cy="32" r="44" fill="none" stroke="#ff4444" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- "4.2" large text -->
    <text x="32" y="44" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="bold">4.2</text>
    <text x="32" y="62" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="bold">METRES</text>
    <!-- "max" below circle -->
    <text x="32" y="98" text-anchor="middle" fill="#cc0000" font-family="Arial, sans-serif" font-size="14" font-weight="bold">MAX</text>
  </g>

  <!-- MJ MAPS alert overlay chip -->
  <g transform="translate(200, 80)">
    <rect x="0" y="0" width="240" height="60" rx="8" fill="#1a0808" stroke="#EF4444" stroke-width="1.5" opacity="0.95"/>
    <rect x="10" y="10" width="50" height="22" rx="11" fill="#EF4444" fill-opacity="0.2" stroke="#EF4444" stroke-width="1"/>
    <text x="35" y="26" text-anchor="middle" fill="#EF4444" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700">RED</text>
    <text x="72" y="24" fill="#F1F5F9" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="600">Low bridge alert</text>
    <text x="72" y="40" fill="#94A3B8" font-family="'IBM Plex Mono', monospace" font-size="9">Bridge 4.2m · Your lorry 4.6m</text>
  </g>

  <!-- Alert glow on bridge opening -->
  <rect x="80" y="500" width="1440" height="120" fill="url(#alert-glow)" opacity="0.4"/>

  <!-- HGV / LORRY (articulated, stopped under bridge) -->
  <!-- The lorry is TALLER than the bridge — this is the problem -->
  <g filter="url(#sw3)">
    <!-- Lorry shadow -->
    <ellipse cx="800" cy="920" rx="280" ry="25" fill="#000" fill-opacity="0.4"/>
    <!-- Articulated tractor unit -->
    <!-- Cab -->
    <rect x="580" y="620" width="200" height="200" rx="8" fill="#c0c0c8"/>
    <!-- Cab roof -->
    <rect x="575" y="608" width="210" height="22" rx="4" fill="#d0d0d8"/>
    <!-- Windscreen -->
    <rect x="700" y="628" width="65"  height="70" rx="4" fill="#1a2838" fill-opacity="0.9"/>
    <rect x="705" y="633" width="26" height="4" rx="2" fill="#fff" fill-opacity="0.15"/>
    <!-- Side window -->
    <rect x="592" y="632" width="60"  height="50" rx="4" fill="#1a2838" fill-opacity="0.8"/>
    <!-- Exhaust stack -->
    <rect x="760" y="580" width="12" height="45" rx="3" fill="#707070"/>
    <!-- Fuel tanks -->
    <rect x="560" y="760" width="40" height="65" rx="4" fill="#808088"/>
    <!-- Fifth wheel coupling -->
    <rect x="780" y="790" width="40" height="30" rx="3" fill="#606068"/>
    <!-- Bumper -->
    <rect x="580" y="800" width="200" height="24" rx="4" fill="#a0a0a8"/>
    <!-- Headlights -->
    <rect x="590" y="770" width="22" height="20" rx="3" fill="#ffffc0" opacity="0.9"/>
    <rect x="590" y="794" width="22" height="20" rx="3" fill="#ffffc0" opacity="0.7"/>
    <!-- Number plate -->
    <rect x="650" y="802" width="55" height="18" rx="2" fill="#f0f0dc"/>
    <text x="677" y="815" text-anchor="middle" fill="#1a1a28" font-family="monospace" font-size="8" font-weight="bold">KX64 ABC</text>
    <!-- Tractor wheels -->
    <ellipse cx="620" cy="820" rx="38" ry="16" fill="#111"/>
    <ellipse cx="620" cy="820" rx="25" ry="10" fill="#1c1c1c"/>
    <ellipse cx="620" cy="820" rx="10" ry="5"  fill="#282828"/>
    <ellipse cx="760" cy="820" rx="38" ry="16" fill="#111"/>
    <ellipse cx="760" cy="820" rx="25" ry="10" fill="#1c1c1c"/>
    <ellipse cx="760" cy="820" rx="10" ry="5"  fill="#282828"/>

    <!-- Trailer unit (box, 4.6m tall — taller than 4.2m bridge!) -->
    <!-- The trailer is taller than the bridge — this is the danger -->
    <rect x="820" y="560" width="380" height="260" rx="4" fill="#d8d8e0"/>
    <!-- Trailer ribs -->
    <g stroke="#c0c0c8" stroke-width="0.7" opacity="0.4">
      <line x1="820" y1="610" x2="1200" y2="610"/>
      <line x1="820" y1="660" x2="1200" y2="660"/>
      <line x1="820" y1="710" x2="1200" y2="710"/>
      <line x1="820" y1="760" x2="1200" y2="760"/>
    </g>
    <!-- Trailer side panel -->
    <rect x="1200" y="560" width="40" height="260" fill="#c8c8d0"/>
    <rect x="1204" y="580" width="32" height="220" rx="2" fill="#e0e0e8"/>
    <!-- Coupling -->
    <rect x="800" y="790" width="25" height="30" rx="3" fill="#606068"/>
    <!-- Trailer wheels (dual axle) -->
    <ellipse cx="870"  cy="820" rx="38" ry="16" fill="#111"/>
    <ellipse cx="870"  cy="820" rx="25" ry="10" fill="#1c1c1c"/>
    <ellipse cx="870"  cy="820" rx="10" ry="5"  fill="#282828"/>
    <ellipse cx="950"  cy="820" rx="38" ry="16" fill="#111"/>
    <ellipse cx="950"  cy="820" rx="25" ry="10" fill="#1c1c1c"/>
    <ellipse cx="950"  cy="820" rx="10" ry="5"  fill="#282828"/>
    <ellipse cx="1050" cy="820" rx="38" ry="16" fill="#111"/>
    <ellipse cx="1050" cy="820" rx="25" ry="10" fill="#1c1c1c"/>
    <ellipse cx="1050" cy="820" rx="10" ry="5"  fill="#282828"/>
  </g>

  <!-- Collision/crush indicator: the lorry top is HIGHER than bridge -->
  <!-- Red zone above bridge soffit -->
  <rect x="820" y="500" width="380" height="60" fill="#EF4444" fill-opacity="0.12"/>
  <line x1="820" y1="540" x2="1200" y2="540" stroke="#EF4444" stroke-width="2" stroke-dasharray="6,4" opacity="0.8"/>
  <!-- "4.6m" label on lorry top -->
  <rect x="1000" y="530" width="60" height="18" rx="4" fill="#1a0808" stroke="#EF4444" stroke-width="1"/>
  <text x="1030" y="543" text-anchor="middle" fill="#EF4444" font-family="'IBM Plex Mono', monospace" font-size="10">4.6m</text>

  <!-- Vignette + grain -->
  <rect width="1600" height="900" fill="url(#vignette3)"/>
  <rect width="1600" height="900" fill="#808080" fill-opacity="0.02" filter="url(#grain3)"/>
</svg>