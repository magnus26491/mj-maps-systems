<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <radialGradient id="pin-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Satellite-ish background -->
  <rect width="640" height="400" fill="#0f1a0f"/>
  <!-- Fields / terrain patches -->
  <rect x="0" y="0" width="640" height="400" fill="#0e1a10"/>
  <rect x="0" y="0" width="320" height="200" fill="#0f1f12" rx="0"/>
  <rect x="320" y="200" width="320" height="200" fill="#0f1f12" rx="0"/>
  <rect x="60" y="60" width="180" height="140" fill="#122018" rx="4"/>
  <rect x="280" y="20" width="240" height="120" fill="#132118" rx="4"/>
  <rect x="60" y="240" width="260" height="120" fill="#111f12" rx="4"/>
  <rect x="380" y="210" width="200" height="160" fill="#132018" rx="4"/>
  <!-- Farm track -->
  <rect x="400" y="0" width="18" height="200" fill="#1c2e1c" rx="2"/>
  <rect x="400" y="195" width="200" height="14" fill="#1c2e1c" rx="2"/>
  <!-- Gate indicator -->
  <rect x="395" y="190" width="30" height="24" fill="rgba(34,197,94,0.12)" stroke="#22c55e" stroke-width="1.5" rx="3"/>
  <line x1="395" y1="202" x2="425" y2="202" stroke="#22c55e" stroke-width="2"/>
  <!-- Precise pin -->
  <circle cx="410" cy="197" r="28" fill="url(#pin-glow)"/>
  <circle cx="410" cy="188" r="13" fill="#22c55e"/>
  <path d="M398 188 a12 12 0 0 1 24 0 q0 10-12 20-12-10-12-20z" fill="#22c55e"/>
  <circle cx="410" cy="187" r="4.5" fill="#fff"/>
  <!-- what3words badge -->
  <rect x="430" y="168" width="188" height="44" fill="#0e1a0e" rx="6" stroke="#22c55e" stroke-width="1" stroke-opacity="0.5"/>
  <text x="442" y="185" fill="#22c55e" font-size="11" font-family="system-ui,sans-serif" font-weight="700">///filled.lamp.arrive</text>
  <text x="442" y="202" fill="#5c7f5c" font-size="10" font-family="system-ui,sans-serif">Exact 3m² pin · gate entrance</text>
  <!-- Confirm chip -->
  <rect x="340" y="240" width="140" height="28" fill="#0f2f1a" rx="14" stroke="#22c55e" stroke-width="1"/>
  <text x="365" y="258" fill="#22c55e" font-size="12" font-family="system-ui,sans-serif" font-weight="600">✓ First-time delivery</text>
</svg>
