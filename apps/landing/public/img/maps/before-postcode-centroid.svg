<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <defs>
    <linearGradient id="road-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2535"/>
      <stop offset="100%" stop-color="#131b26"/>
    </linearGradient>
  </defs>
  <!-- Map background -->
  <rect width="640" height="400" fill="#0e1822"/>
  <!-- Block fills (buildings/plots) -->
  <rect x="0" y="0" width="200" height="140" fill="#121d2c" rx="2"/>
  <rect x="240" y="0" width="160" height="140" fill="#121d2c" rx="2"/>
  <rect x="440" y="0" width="200" height="140" fill="#121d2c" rx="2"/>
  <rect x="0" y="260" width="200" height="140" fill="#121d2c" rx="2"/>
  <rect x="240" y="260" width="400" height="140" fill="#121d2c" rx="2"/>
  <!-- Property borders -->
  <rect x="2" y="2" width="196" height="136" fill="none" stroke="#1e2d40" stroke-width="1"/>
  <rect x="242" y="2" width="156" height="136" fill="none" stroke="#1e2d40" stroke-width="1"/>
  <rect x="442" y="2" width="196" height="136" fill="none" stroke="#1e2d40" stroke-width="1"/>
  <!-- Road horizontal -->
  <rect x="0" y="154" width="640" height="52" fill="#1a2740"/>
  <line x1="0" y1="180" x2="640" y2="180" stroke="#243352" stroke-width="1.5" stroke-dasharray="20 14"/>
  <!-- Road vertical -->
  <rect x="208" y="0" width="28" height="400" fill="#1a2740"/>
  <rect x="412" y="0" width="28" height="400" fill="#1a2740"/>
  <!-- Wrong postcode centroid pin (centre of road) -->
  <circle cx="320" cy="180" r="18" fill="rgba(239,68,68,0.18)" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="320" cy="170" r="10" fill="#ef4444"/>
  <path d="M312 170 a8 8 0 0 1 16 0 q0 6-8 14-8-8-8-14z" fill="#ef4444"/>
  <circle cx="320" cy="169" r="3.5" fill="#fff"/>
  <!-- Label: wrong -->
  <rect x="334" y="150" width="140" height="24" fill="#1a2535" rx="4"/>
  <text x="342" y="166" fill="#ef4444" font-size="12" font-family="system-ui,sans-serif" font-weight="600">⚠ Postcode centroid</text>
  <!-- Distance dashes to gate -->
  <line x1="320" y1="180" x2="475" y2="50" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.6"/>
  <!-- Actual gate/property -->
  <rect x="452" y="20" width="80" height="60" fill="rgba(34,197,94,0.08)" stroke="#22c55e" stroke-width="1.5" rx="4" stroke-dasharray="4 3"/>
  <circle cx="492" cy="50" r="7" fill="#22c55e" opacity="0.9"/>
  <text x="540" y="45" fill="#22c55e" font-size="10" font-family="system-ui,sans-serif" font-weight="600">Actual</text>
  <text x="540" y="58" fill="#22c55e" font-size="10" font-family="system-ui,sans-serif" font-weight="600">gate</text>
  <!-- Distance label -->
  <rect x="355" y="90" width="58" height="20" fill="#1a2535" rx="3"/>
  <text x="363" y="104" fill="#8aa0b2" font-size="11" font-family="system-ui,sans-serif">~50m off</text>
</svg>
