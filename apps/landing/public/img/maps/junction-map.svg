<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" width="640" height="400">
  <rect width="640" height="400" fill="#0a0e14"/>
  <!-- Blocks -->
  <rect x="0" y="0" width="240" height="160" fill="#111b27" rx="2"/>
  <rect x="280" y="0" width="360" height="160" fill="#111b27" rx="2"/>
  <rect x="0" y="230" width="240" height="170" fill="#111b27" rx="2"/>
  <rect x="320" y="230" width="320" height="170" fill="#111b27" rx="2"/>
  <!-- Main road -->
  <rect x="0" y="164" width="640" height="60" fill="#131b26"/>
  <line x1="0" y1="194" x2="640" y2="194" stroke="#1e2d40" stroke-width="1.5" stroke-dasharray="18 12"/>
  <!-- Side road -->
  <rect x="248" y="0" width="28" height="400" fill="#131b26"/>
  <!-- Route line -->
  <polyline points="0,194 180,194 180,140 280,140 280,194 480,194" stroke="#2ee6ce" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <!-- Turn-score warning circle at junction -->
  <circle cx="280" cy="194" r="36" fill="rgba(245,158,11,0.12)" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- Amber chip -->
  <rect x="296" y="148" width="120" height="28" fill="#1c1500" rx="6" stroke="#f59e0b" stroke-width="1"/>
  <text x="313" y="167" fill="#f59e0b" font-size="12" font-family="system-ui,sans-serif" font-weight="700">⚠ Tight turn</text>
  <!-- Advance warning 300m back -->
  <rect x="42" y="172" width="100" height="22" fill="#0e1520" rx="4" stroke="#2ee6ce" stroke-width="1" stroke-opacity="0.5"/>
  <text x="54" y="187" fill="#2ee6ce" font-size="10.5" font-family="system-ui,sans-serif">300m warning</text>
</svg>
