<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" width="640" height="420" role="img" aria-label="MJ Maps junction turn-score panel — tight right turn graded RED">
  <title>Junction turn-score panel — tight right turn</title>
  <desc>Dark cartographic map showing a UK road junction with a tight right turn graded RED by MJ Maps turn-score. Road width and vehicle clearance shown, rerouting indicator visible.</desc>
  <defs>
    <linearGradient id="road-grad-jm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2030"/>
      <stop offset="100%" stop-color="#121828"/>
    </linearGradient>
    <filter id="glow-jm" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="alert-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#EF4444" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Base: dark night asphalt -->
  <rect width="640" height="420" fill="#0a0e14"/>

  <!-- Background: subtle field / grass -->
  <rect x="0"   y="0" width="200" height="420" fill="#0c1a0c" opacity="0.6"/>
  <rect x="440" y="0" width="200" height="420" fill="#0c1a0c" opacity="0.6"/>

  <!-- Main roads: T-junction -->
  <!-- Vertical road (coming from bottom) -->
  <g stroke="#1e2840" stroke-width="48" stroke-linecap="butt">
    <line x1="240" y1="420" x2="240" y2="160"/>
  </g>
  <!-- Road surface texture -->
  <g stroke="#1a2438" stroke-width="44" stroke-linecap="butt" opacity="0.5">
    <line x1="240" y1="420" x2="240" y2="160"/>
  </g>

  <!-- Horizontal road (through road) -->
  <g stroke="#1e2840" stroke-width="40" stroke-linecap="butt">
    <line x1="0" y1="160" x2="640" y2="160"/>
  </g>
  <g stroke="#1a2438" stroke-width="36" stroke-linecap="butt" opacity="0.5">
    <line x1="0" y1="160" x2="640" y2="160"/>
  </g>

  <!-- Road edge lines -->
  <g stroke="#2a3850" stroke-width="1.2" opacity="0.6">
    <!-- Vertical road edges -->
    <line x1="216" y1="420" x2="216" y2="160"/>
    <line x1="264" y1="420" x2="264" y2="160"/>
    <!-- Horizontal road edges -->
    <line x1="0" y1="140" x2="640" y2="140"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
  </g>

  <!-- Road centre dashes: vertical road -->
  <g stroke="#3a4a60" stroke-width="0.8" stroke-dasharray="6,12" stroke-linecap="round" opacity="0.5">
    <line x1="240" y1="410" x2="240" y2="170"/>
  </g>

  <!-- Pavements / footways -->
  <g fill="#141820" opacity="0.9">
    <!-- Left of vertical road -->
    <rect x="170" y="160" width="44" height="260" rx="2"/>
    <!-- Right of vertical road -->
    <rect x="266" y="160" width="44" height="260" rx="2"/>
    <!-- Above/below horizontal road -->
    <rect x="0"   y="104" width="640" height="34" rx="2"/>
    <rect x="0"   y="184" width="220" height="34" rx="2"/>
    <rect x="280" y="184" width="360" height="34" rx="2"/>
  </g>

  <!-- Buildings: terraced houses on left street -->
  <g fill="#131820" stroke="#1e2838" stroke-width="0.5" opacity="0.9">
    <!-- Left side: houses on the horizontal road -->
    <rect x="12"  y="108" width="45" height="30" rx="2"/>
    <rect x="63"  y="108" width="45" height="30" rx="2"/>
    <rect x="114" y="108" width="45" height="30" rx="2"/>
    <!-- Right side of horizontal road -->
    <rect x="12"  y="186" width="45" height="30" rx="2"/>
    <rect x="63"  y="186" width="45" height="30" rx="2"/>
    <rect x="114" y="186" width="45" height="30" rx="2"/>
    <!-- Houses along vertical road left (oncoming side) -->
    <rect x="172" y="165" width="42" height="28" rx="2"/>
    <rect x="172" y="198" width="42" height="28" rx="2"/>
    <rect x="172" y="231" width="42" height="28" rx="2"/>
    <rect x="172" y="264" width="42" height="28" rx="2"/>
    <rect x="172" y="297" width="42" height="28" rx="2"/>
    <rect x="172" y="330" width="42" height="28" rx="2"/>
    <rect x="172" y="363" width="42" height="28" rx="2"/>
    <!-- Houses on vertical road right side -->
    <rect x="268" y="165" width="42" height="28" rx="2"/>
    <rect x="268" y="198" width="42" height="28" rx="2"/>
    <rect x="268" y="231" width="42" height="28" rx="2"/>
    <rect x="268" y="264" width="42" height="28" rx="2"/>
    <rect x="268" y="297" width="42" height="28" rx="2"/>
    <rect x="268" y="330" width="42" height="28" rx="2"/>
    <rect x="268" y="363" width="42" height="28" rx="2"/>
    <!-- Far right: more houses on horizontal road -->
    <rect x="288" y="108" width="45" height="30" rx="2"/>
    <rect x="339" y="108" width="45" height="30" rx="2"/>
    <rect x="390" y="108" width="45" height="30" rx="2"/>
    <rect x="288" y="186" width="45" height="30" rx="2"/>
    <rect x="339" y="186" width="45" height="30" rx="2"/>
    <rect x="390" y="186" width="45" height="30" rx="2"/>
  </g>

  <!-- Road labels -->
  <g fill="#2a3a4a" font-family="'IBM Plex Mono', monospace" font-size="8" opacity="0.5">
    <text x="10" y="155">Holly Lane</text>
    <text x="246" y="300">Church Road</text>
  </g>

  <!-- ======= ROUTE PATH OVERLAY ======= -->
  <!-- Route approaching from bottom, turning RIGHT at the T-junction -->
  <!-- Glow under the route -->
  <g filter="url(#glow-jm)">
    <!-- Approaching route (vertical road, from bottom up to junction) -->
    <path d="M 240 420 L 240 220 L 300 160 L 460 160"
          stroke="#00C2A8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
          fill="none" opacity="0.9"/>
    <!-- Turn indicator: dashed continuation (going through — rerouted) -->
    <path d="M 460 160 L 620 160"
          stroke="#F59E0B" stroke-width="3" stroke-linecap="round" fill="none"
          stroke-dasharray="6,5" opacity="0.7"/>
  </g>

  <!-- Route stop dots -->
  <circle cx="240" cy="420" r="6" fill="#3B82F6" opacity="0.8"/>
  <circle cx="240" cy="220" r="5" fill="#00C2A8" opacity="0.8"/>

  <!-- Turn direction arrow at junction (amber — this is the tight turn) -->
  <!-- Arrow showing the intended turn going right -->
  <path d="M 240 200 L 290 165 L 270 160 L 310 155 L 310 170 L 290 165 L 310 175 L 310 160 L 270 160"
        stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        fill="none" opacity="0.9"/>

  <!-- ======= TURN SCORE OVERLAY PANEL ======= -->
  <!-- RED alert glow around junction -->
  <ellipse cx="260" cy="200" rx="60" ry="50" fill="url(#alert-glow)"/>

  <!-- Score chip: RED — tight turn -->
  <g transform="translate(390, 20)">
    <rect x="0" y="0" width="220" height="60" rx="8" fill="#1a0808" stroke="#EF4444" stroke-width="1.5" opacity="0.95"/>
    <!-- RED badge -->
    <rect x="12" y="12" width="52" height="22" rx="11" fill="#EF4444" opacity="0.2" stroke="#EF4444" stroke-width="1"/>
    <text x="38" y="27" text-anchor="middle" fill="#EF4444" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700">RED</text>
    <!-- Label -->
    <text x="76" y="22" fill="#F1F5F9" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600">Tight right turn</text>
    <text x="76" y="36" fill="#94A3B8" font-family="'IBM Plex Mono', monospace" font-size="9">Bridge 3.8m · Vehicle 4.2m</text>
    <!-- Rerouting icon -->
    <g transform="translate(174, 8)">
      <circle cx="14" cy="14" r="14" fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1"/>
      <path d="M 8 20 L 14 8 L 20 20 M 14 8 L 14 22" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- Bottom info strip -->
  <g transform="translate(0, 388)">
    <rect x="0" y="0" width="640" height="32" fill="#0d1117" fill-opacity="0.85"/>
    <text x="16" y="20" fill="#64748B" font-family="'IBM Plex Mono', monospace" font-size="9">MJ Maps · Turn Score · Route 4 of 11</text>
    <text x="520" y="20" fill="#00C2A8" font-family="'IBM Plex Mono', monospace" font-size="9">ETA 14:32 · 2.4 mi</text>
  </g>
</svg>
